        ai_context:
          synonyms: ["付款", "Payment"]
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SAP_P2P",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "payments/execute",
                    "title": "执行付款（占位动作）",
                    "kind": "command",
                    "operation": "execute",
                    "aggregate": "Payment",
                    "entity_name": "payments",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["supplier_invoice_id"],
                        "properties": {
                          "supplier_invoice_id": { "type": "string" },
                          "payment_date": { "type": "string", "format": "date-time" },
                          "amount": { "type": "number" },
                          "currency": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["执行这张发票的付款", "把付款从 Planned 推进到 Executed"],
                    "tags": ["p2p", "payment", "execute"]
                  },
                  {
                    "id": "payments/cancel",
                    "title": "撤销付款（占位动作）",
                    "kind": "command",
                    "operation": "cancel",
                    "aggregate": "Payment",
                    "entity_name": "payments",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["payment_id"],
                        "properties": {
                          "payment_id": { "type": "string" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["撤销这笔付款", "取消 payment"],
                    "tags": ["p2p", "payment", "cancel"]
                  }
                ],
                "rules": []
              }
        fields:
          - name: payment_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: payments.payment_id
            description: 付款内部ID
          - name: payment_document_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: payments.payment_document_number
            description: 付款凭证号
          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: payments.status
            description: 付款状态（Planned/Executed/Cancelled 等）
          - name: supplier_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: payments.supplier_id
            description: 供应商ID
          - name: supplier_invoice_id
