              dialects:
                - dialect: ANSI_SQL
                  expression: purchase_requisition_items.purchase_requisition_id
            description: PR Header ID
          - name: item_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: purchase_requisition_items.item_number
            description: 行号
          - name: material_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: purchase_requisition_items.material_id
            description: 物料ID
          - name: description
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: purchase_requisition_items.description
            description: 行描述/短文本
          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
