                            "default": ["avg_days"]
                          }
                        }
                      }
                    },
                    "examples": ["从请购到采购订单平均要多少天？", "按采购组拆解 PR→PO 周期"],
                    "tags": ["p2p", "analytics", "cycle_time"]
                  },
                  {
                    "id": "purchase_orders/analyze_three_way_match_exception_hotspots",
                    "title": "三单匹配异常热点分析",
                    "kind": "query",
                    "operation": "analyze",
                    "aggregate": "P2PAnalytics",
                    "entity_name": "purchase_orders",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "date_range": {
                            "type": "object",
                            "additionalProperties": false,
                            "required": ["start", "end"],
                            "properties": {
                              "start": { "type": "string", "format": "date-time" },
                              "end": { "type": "string", "format": "date-time" }
                            }
                          },
                          "group_by": {
                            "type": "array",
                            "items": {
                              "type": "string",
                              "enum": ["supplier_id", "material_id", "material_group_id", "plant_id", "company_code_id"]
                            },
                            "default": ["supplier_id", "material_id"]
                          },
                          "top_n": { "type": "integer", "default": 20 }
                        }
                      }
                    },
                    "examples": ["三单匹配异常主要集中在哪些物料/供应商？", "列出异常最多的供应商 TOP20"],
                    "tags": ["p2p", "analytics", "three_way_match", "exceptions"]
                  }
                ],
                "rules": [
                  {
                    "id": "sap_p2p/rule_three_way_match",
                    "title": "三单匹配（PO/GR/IV）约束",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "consistency" },
                    "message": "给出“过账/付款”建议前，应先校验三单匹配：PO/GR/IV 在数量与金额差异超过阈值时，不应直接建议过账或支付，必须先标记异常并追溯到 PO item / GR item / IV item。",
                    "remediation": "检查部分收货/部分开票；核对币种、税、价格条件；确认 GR 与 IV 是否引用同一 PO item。",
                    "tags": ["p2p", "three_way_match", "control"]
                  },
                  {
                    "id": "sap_p2p/rule_gr_ir_reconciliation",
                    "title": "GR/IR 对账提示",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "reconciliation" },
                    "message": "GR/IR 未清金额长期不归零时，应提示排查：缺失发票、数量差异或价格差异，并沿文档链路追溯。",
                    "remediation": "从 GR/IR open amount 追溯到 GR、IV 与 PO；检查是否存在未到票、未入库或差异过账。",
                    "tags": ["p2p", "gr_ir", "control"]
                  },
                  {
                    "id": "sap_p2p/rule_org_relationship_integrity",
                    "title": "组织结构关系完整性",
                    "severity": "error",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "relationship_integrity" },
                    "message": "若 PR/PO 缺失 company_code/plant/purchasing_org/purchasing_group 等关联，优先视为配置或主数据问题，不应直接给出流程建议。",
                    "remediation": "先补齐组织结构对象与关系（Plant→CompanyCode 等），再进行单据流程与指标分析。",
                    "tags": ["p2p", "org", "integrity"]
                  },
                  {
                    "id": "sap_p2p/rule_parked_invoice_state_machine",
                    "title": "暂存发票（PARKED）状态机约束",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "state_machine" },
