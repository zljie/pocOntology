                              }
                            }
                          }
                        }
                      }
                    },
                    "examples": ["创建一张采购订单", "下 PO 给供应商"],
                    "tags": ["p2p", "po", "crud"]
                  },
                  {
                    "id": "purchase_orders/approve_or_release",
                    "title": "审批/释放采购订单",
                    "kind": "command",
                    "operation": "approve",
                    "aggregate": "PurchaseOrder",
                    "entity_name": "purchase_orders",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
