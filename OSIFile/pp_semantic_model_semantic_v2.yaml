    metrics:
      - name: pr_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT purchase_requisitions.purchase_requisition_id)
        description: 请购单数量
        ai_context:
          synonyms: ["PR 数量", "请购数量"]

      - name: po_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT purchase_orders.purchase_order_id)
        description: 采购订单数量
        ai_context:
          synonyms: ["PO 数量", "采购订单数量"]

      - name: gr_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT goods_receipts.goods_receipt_id)
        description: 收货单数量
        ai_context:
          synonyms: ["GR 数量", "收货数量"]

      - name: invoice_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT supplier_invoices.supplier_invoice_id)
        description: 供应商发票数量
        ai_context:
          synonyms: ["发票数量", "IV 数量"]

      - name: parked_invoice_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN supplier_invoices.status = 'PARKED' THEN 1 ELSE 0 END) / NULLIF(COUNT(DISTINCT supplier_invoices.supplier_invoice_id), 0)
        description: 暂存发票占比（parked invoice rate）
        ai_context:
          synonyms: ["暂存发票占比", "parked invoice rate"]

      - name: three_way_match_exception_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN supplier_invoice_items.is_three_way_match_exception THEN 1 ELSE 0 END)
        description: 三单匹配异常数量（口径：IV 行级字段 is_three_way_match_exception）
        ai_context:
          synonyms: ["三单匹配异常", "three way match exception"]

      - name: gr_ir_open_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(gr_ir_open_items.open_amount)
        description: GR/IR 未清金额（口径：ΣGR/IR open items 的 open_amount）
        ai_context:
          synonyms: ["GR/IR 未清金额", "GRIR open amount"]

      - name: pr_to_po_cycle_time_days
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(purchase_orders.created_date - purchase_requisitions.created_date)
        description: 从 PR 创建到 PO 创建的平均周期（天；口径：PO.created_date - PR.created_date，通过 purchase_orders_to_purchase_requisitions 关联）
        ai_context:
          synonyms: ["PR 到 PO 周期", "请购到下单周期"]

      - name: invoice_to_pay_cycle_days
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(payments.payment_date - supplier_invoices.invoice_date)
        description: 发票到付款的平均周期（天；依赖 payments↔supplier_invoices 关联）
        ai_context:
          synonyms: ["发票到付款周期", "invoice to pay cycle"]

      - name: overdue_payment_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN payments.payment_date > supplier_invoices.due_date THEN 1 ELSE 0 END) / NULLIF(COUNT(DISTINCT payments.payment_id), 0)
        description: 逾期付款率（占位：依赖 supplier_invoices.due_date 口径由映射层补齐）
        ai_context:
          synonyms: ["逾期付款率", "overdue payment rate"]

      - name: duplicate_invoice_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT supplier_invoices.supplier_invoice_id) - COUNT(DISTINCT (supplier_invoices.supplier_id || ':' || supplier_invoices.invoice_number))
        description: 重复发票数量候选口径（同供应商 invoice_number 去重后的差值；需结合例外与清洗规则）
        ai_context:
          synonyms: ["重复发票数量", "duplicate invoice count"]

      - name: blocked_vendor_po_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN suppliers.status = 'Blocked' THEN purchase_orders.purchase_order_id END)
        description: 阻断供应商仍发生 PO 的数量（口径：按 purchase_orders 计数，依赖 purchase_orders↔suppliers 关联）
        ai_context:
          synonyms: ["阻断供应商PO", "blocked vendor po count"]

      - name: blocked_vendor_invoice_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN suppliers.status = 'Blocked' THEN supplier_invoices.supplier_invoice_id END)
        description: 阻断供应商仍发生发票的数量（口径：按 supplier_invoices 计数，依赖 supplier_invoices↔suppliers 关联）
        ai_context:
          synonyms: ["阻断供应商发票", "blocked vendor invoice count"]

      - name: blocked_vendor_payment_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN suppliers.status = 'Blocked' THEN payments.payment_id END)
        description: 阻断供应商仍发生付款的数量（口径：按 payments 计数，依赖 payments↔suppliers 关联）
        ai_context:
          synonyms: ["阻断供应商付款", "blocked vendor payment count"]

      - name: blocked_vendor_transaction_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN suppliers.status = 'Blocked' THEN purchase_orders.purchase_order_id END) + COUNT(DISTINCT CASE WHEN suppliers.status = 'Blocked' THEN supplier_invoices.supplier_invoice_id END) + COUNT(DISTINCT CASE WHEN suppliers.status = 'Blocked' THEN payments.payment_id END)
