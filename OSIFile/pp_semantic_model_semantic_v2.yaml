                        }
                      }
                    },
                    "examples": ["审批这张 PO", "释放采购订单"],
                    "tags": ["p2p", "po", "approval"]
                  },
                  {
                    "id": "purchase_orders/analyze_pr_to_po_cycle_time",
                    "title": "PR→PO 周期分析",
                    "kind": "query",
                    "operation": "analyze",
                    "aggregate": "P2PAnalytics",
                    "entity_name": "purchase_orders",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "date_range": {
                            "type": "object",
                            "additionalProperties": false,
                            "required": ["start", "end"],
                            "properties": {
                              "start": { "type": "string", "format": "date-time" },
                              "end": { "type": "string", "format": "date-time" }
                            }
                          },
                          "group_by": {
                            "type": "array",
                            "items": {
                              "type": "string",
                              "enum": ["company_code_id", "purchasing_org_id", "purchasing_group_id", "supplier_id", "plant_id", "material_group_id"]
