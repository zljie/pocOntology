              dialects:
                - dialect: ANSI_SQL
                  expression: >
                    CASE
                      WHEN supplier_invoice_items.purchase_order_item_id IS NULL THEN FALSE
                      WHEN supplier_invoice_items.quantity IS NULL THEN FALSE
                      WHEN ABS(
                        supplier_invoice_items.quantity
                        - COALESCE(
                            (SELECT purchase_order_items.quantity
                             FROM purchase_order_items
                             WHERE purchase_order_items.purchase_order_item_id = supplier_invoice_items.purchase_order_item_id),
                            0
                          )
                      ) > 0 THEN TRUE
                      WHEN ABS(
                        supplier_invoice_items.quantity
                        - COALESCE(
                            (SELECT SUM(goods_receipt_items.quantity)
                             FROM goods_receipt_items
                             WHERE goods_receipt_items.purchase_order_item_id = supplier_invoice_items.purchase_order_item_id),
                            0
                          )
                      ) > 0 THEN TRUE
                      ELSE FALSE
                    END
            description: 是否三单匹配异常（数量口径：IV.qty vs PO.qty 或 IV.qty vs ΣGR.qty；阈值当前为“非零差异”，可在映射层/规则层扩展为容忍度与原因码）
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_items.created_date
            description: 创建日期
            dimension:
              is_time: true

      - name: payments
        source: sap.p2p.payments
        primary_key: [payment_id]
