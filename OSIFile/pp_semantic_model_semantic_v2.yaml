      # ==========================================================
      # Diagnostics / Bridge Entity
      # ==========================================================
      - name: supplier_invoice_requests
        source: sap.p2p.supplier_invoice_requests
        primary_key: [supplier_invoice_request_id]
        unique_keys:
          - [supplier_invoice_request_id]
          - [request_number]
        description: 供应商发票请求/消息桥接对象（用于“PO 不可开票/流程通信错误”等诊断）
        ai_context:
          synonyms: ["发票请求", "Supplier Invoice Request", "不可开票", "流程通信错误"]
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SAP_P2P",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "supplier_invoice_requests/diagnose_po_not_invoiceable",
                    "title": "诊断 PO 不可开票原因",
                    "kind": "query",
                    "operation": "diagnose",
                    "aggregate": "SupplierInvoiceRequest",
                    "entity_name": "supplier_invoice_requests",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["purchase_order_id"],
                        "properties": {
                          "purchase_order_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["为什么这个 PO 不可开票？", "诊断 PO 不能开票的原因"],
                    "tags": ["p2p", "diagnostics", "invoiceable"]
                  }
                ],
                "rules": [
                  {
                    "id": "sap_p2p/rule_invoice_request_bridge_first",
                    "title": "不可开票诊断优先检查桥接对象",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "diagnostic" },
                    "message": "遇到“PO 不可开票/流程通信错误”时，应优先检查 supplier_invoice_requests 的状态与错误码，再进一步给出流程或配置建议。",
                    "remediation": "先查询 supplier_invoice_requests 记录与 error_code/error_message；再检查科目分配类型（account assignment type）是否适配开票流程。",
                    "tags": ["p2p", "bridge", "kba"]
                  }
                ]
              }
        fields:
          - name: supplier_invoice_request_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.supplier_invoice_request_id
            description: 请求ID
          - name: request_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.request_number
            description: 请求号
          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.status
            description: 状态（Created/Sent/Failed/Resolved 等）
          - name: purchase_order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.purchase_order_id
            description: 关联 PO ID
          - name: supplier_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.supplier_id
            description: 供应商ID
          - name: company_code_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.company_code_id
            description: 公司代码ID
          - name: error_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.error_code
            description: 错误码
          - name: error_message
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.error_message
            description: 错误信息
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.created_date
            description: 创建日期
            dimension:
              is_time: true
          - name: last_updated_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: supplier_invoice_requests.last_updated_date
            description: 最后更新时间
            dimension:
              is_time: true

