      # ==========================================================
      # Facts / Documents (P2P)
      # ==========================================================
      - name: purchase_requisitions
        source: sap.p2p.purchase_requisitions
        primary_key: [purchase_requisition_id]
        unique_keys:
          - [purchase_requisition_id]
          - [purchase_requisition_number]
        description: 请购单（Purchase Requisition, PR）- Header
        ai_context:
          synonyms: ["请购单", "PR", "Purchase Requisition"]
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SAP_P2P",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "purchase_requisitions/validate",
                    "title": "请购单校验（仅校验不提交）",
                    "kind": "command",
                    "operation": "validate",
                    "aggregate": "PurchaseRequisition",
                    "entity_name": "purchase_requisitions",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["company_code_id", "items"],
                        "properties": {
                          "company_code_id": { "type": "string" },
                          "plant_id": { "type": "string" },
                          "purchasing_org_id": { "type": "string" },
                          "purchasing_group_id": { "type": "string" },
                          "supplier_id": { "type": "string" },
                          "items": {
                            "type": "array",
                            "minItems": 1,
                            "items": {
                              "type": "object",
                              "additionalProperties": false,
                              "required": ["material_id", "quantity"],
                              "properties": {
                                "material_id": { "type": "string" },
                                "quantity": { "type": "number" },
                                "unit_of_measure": { "type": "string" },
                                "net_price_amount": { "type": "number" },
                                "currency": { "type": "string" }
                              }
                            }
                          }
                        }
                      }
                    },
                    "examples": ["校验这张请购单但不要提交", "检查请购单数据是否合规"],
                    "tags": ["p2p", "pr", "validation"]
                  },
                  {
                    "id": "purchase_requisitions/create",
                    "title": "创建请购单",
                    "kind": "command",
                    "operation": "create",
                    "aggregate": "PurchaseRequisition",
                    "entity_name": "purchase_requisitions",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["company_code_id", "items"],
                        "properties": {
                          "company_code_id": { "type": "string" },
                          "plant_id": { "type": "string" },
                          "purchasing_org_id": { "type": "string" },
                          "purchasing_group_id": { "type": "string" },
                          "supplier_id": { "type": "string" },
                          "requested_delivery_date": { "type": "string", "format": "date-time" },
                          "items": {
                            "type": "array",
                            "minItems": 1,
                            "items": {
                              "type": "object",
                              "additionalProperties": false,
                              "required": ["material_id", "quantity"],
                              "properties": {
                                "material_id": { "type": "string" },
                                "quantity": { "type": "number" },
                                "unit_of_measure": { "type": "string" },
                                "net_price_amount": { "type": "number" },
                                "currency": { "type": "string" }
                              }
                            }
                          }
                        }
                      }
                    },
                    "examples": ["创建一张请购单", "我需要请购 10 个物料"],
                    "tags": ["p2p", "pr", "crud"]
                  },
                  {
                    "id": "purchase_requisitions/approve_or_release",
                    "title": "审批/释放请购单",
                    "kind": "command",
