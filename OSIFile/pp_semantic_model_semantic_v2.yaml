                    "remediation": "先执行 supplier_invoices/release，再视情况 post；如存在三单匹配异常先处理异常。",
                    "tags": ["p2p", "invoice", "parked"]
                  },
                  {
                    "id": "sap_p2p/rule_po_not_invoiceable_bridge",
                    "title": "PO 不可开票（桥接对象优先）",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "diagnostic" },
                    "message": "当出现“PO 不可开票/流程通信错误”等场景，应优先检查 supplier_invoice_requests 是否生成及其状态，并提示关注 account assignment type 适配性。",
                    "remediation": "查询 supplier_invoice_requests 关联该 PO 的记录与错误码；检查科目分配类型是否满足开票流程要求。",
                    "tags": ["p2p", "invoiceable", "bridge", "kba"]
                  }
                ]
              }
        fields:
          - name: purchase_order_id
