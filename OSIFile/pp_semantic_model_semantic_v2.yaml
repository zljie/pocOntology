        description: 供应商发票（Supplier Invoice, IV）- Header
        ai_context:
          synonyms: ["供应商发票", "发票校验", "IV", "Supplier Invoice", "MIRO", "parked invoice"]
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SAP_P2P",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "supplier_invoices/park",
                    "title": "暂存供应商发票（Park）",
                    "kind": "command",
                    "operation": "park",
                    "aggregate": "SupplierInvoice",
                    "entity_name": "supplier_invoices",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["company_code_id", "supplier_id", "invoice_date", "items"],
                        "properties": {
                          "company_code_id": { "type": "string" },
                          "supplier_id": { "type": "string" },
                          "invoice_date": { "type": "string", "format": "date-time" },
                          "currency": { "type": "string" },
                          "items": {
                            "type": "array",
                            "minItems": 1,
                            "items": {
                              "type": "object",
                              "additionalProperties": false,
                              "required": ["purchase_order_item_id", "quantity", "net_amount"],
                              "properties": {
                                "purchase_order_item_id": { "type": "string" },
                                "quantity": { "type": "number" },
                                "unit_of_measure": { "type": "string" },
                                "net_amount": { "type": "number" },
                                "currency": { "type": "string" }
                              }
                            }
                          }
                        }
                      }
                    },
                    "examples": ["暂存一张供应商发票", "先 park 发票再审批"],
                    "tags": ["p2p", "invoice", "park"]
                  },
                  {
                    "id": "supplier_invoices/release",
                    "title": "释放暂存发票（Release）",
                    "kind": "command",
                    "operation": "release",
                    "aggregate": "SupplierInvoice",
                    "entity_name": "supplier_invoices",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["supplier_invoice_id"],
                        "properties": {
                          "supplier_invoice_id": { "type": "string" },
                          "comment": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["释放这张暂存发票", "release parked invoice"],
                    "tags": ["p2p", "invoice", "release"]
                  },
                  {
                    "id": "supplier_invoices/post",
                    "title": "过账供应商发票（Post）",
                    "kind": "command",
                    "operation": "post",
                    "aggregate": "SupplierInvoice",
                    "entity_name": "supplier_invoices",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["supplier_invoice_id"],
                        "properties": {
                          "supplier_invoice_id": { "type": "string" },
                          "posting_date": { "type": "string", "format": "date-time" }
                        }
                      }
                    },
                    "examples": ["过账这张发票", "post invoice"],
                    "tags": ["p2p", "invoice", "post"]
                  },
                  {
                    "id": "supplier_invoices/reverse",
                    "title": "冲销发票（Reverse）",
                    "kind": "command",
                    "operation": "reverse",
                    "aggregate": "SupplierInvoice",
                    "entity_name": "supplier_invoices",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["supplier_invoice_id"],
                        "properties": {
                          "supplier_invoice_id": { "type": "string" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["冲销这张发票", "reverse invoice"],
                    "tags": ["p2p", "invoice", "reverse"]
                  }
                ],
                "rules": [
                  {
                    "id": "sap_p2p/rule_invoice_park_release_before_post",
                    "title": "暂存发票必须先释放再过账",
                    "severity": "error",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "state_machine" },
                    "message": "如果发票状态为 PARKED，则不应直接进行 post 或进入付款建议；必须先 release。",
                    "remediation": "先执行 supplier_invoices/release；如存在三单匹配异常，先处理异常后再 post。",
                    "tags": ["p2p", "invoice", "parked"]
                  },
                  {
                    "id": "sap_p2p/rule_duplicate_invoice_detection",
                    "title": "重复发票识别规则（占位）",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "compliance" },
                    "message": "当同一供应商出现相同 invoice_number（或在容忍度内的近似匹配）时，应提示重复发票风险并人工复核。",
                    "remediation": "按 supplier_id + invoice_number 做重复候选清单；结合发票日期/金额/参考号做例外与清洗；必要时冻结相关付款。",
                    "tags": ["p2p", "invoice", "duplicate", "control"]
                  }
                ]
              }
