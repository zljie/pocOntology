        description: 请购单行项目（PR Item）
        ai_context:
          synonyms: ["请购单行", "PR 行项目", "Purchase Requisition Item"]
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SAP_P2P",
                "behavior_layer_version": "0.1",
                "action_types": [],
                "rules": [
                  {
                    "id": "sap_p2p/rule_pr_item_amount_semantics",
                    "title": "PR 行金额口径说明（用于供应商比价）",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "definition" },
                    "message": "purchase_requisition_items.net_price_amount 可能是单价或行金额；在做“采购金额最小供应商”分析前需统一口径。",
                    "remediation": "建议映射层明确：若为单价则金额=net_price_amount×quantity；若为行金额则直接用 net_price_amount。多币种需补齐汇率折算口径。",
                    "tags": ["p2p", "pr", "amount", "definition"]
                  },
                  {
                    "id": "sap_p2p/rule_material_keyword_match",
                    "title": "物料关键词匹配说明（如“泡面”）",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "definition" },
                    "message": "按关键词识别物料（如泡面）通常依赖 materials.material_name 或 PR 行 description 的文本匹配，存在同义词/别名风险。",
                    "remediation": "建议补齐物料别名/标签（例如 materials.aliases/material_tags）或在映射层维护关键词字典，提高检索稳定性。",
                    "tags": ["p2p", "material", "keyword", "definition"]
                  }
                ]
              }
