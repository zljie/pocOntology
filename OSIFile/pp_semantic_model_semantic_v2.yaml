                  expression: payments.supplier_invoice_id
            description: 关联发票ID
          - name: payment_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: payments.payment_date
            description: 付款日期
            dimension:
              is_time: true
          - name: amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: payments.amount
            description: 付款金额
          - name: currency
