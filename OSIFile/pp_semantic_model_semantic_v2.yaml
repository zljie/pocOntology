# yaml-language-server: $schema=./osi-schema.json

version: "0.1.1"

semantic_model:
  - name: sap_p2p_procurement_ontology_model
    description: SAP 采购管理（P2P：PR→PO→GR→IV→Payment）语义本体模型（核心文档链路 + 组织结构约束 + 对账控制点 + 异常桥接对象）
    ai_context:
      instructions: >
        用于采购到付款（P2P）分析、问答与可执行动作规划。优先使用本语义模型的结构化对象链路、状态与约束回答（Ontology-first），
        如需解释“为何/依据”，再引用外部 SAP 文档或 KBA 作为证据补充（RAG-second）。涉及过账/付款建议时必须遵守：
        1) 三单匹配（PO/GR/IV）数量与金额差异需先定位异常原因；2) GR/IR 对账长期不归零需提示排查；
        3) 暂存发票（PARKED）必须 release 后才能 post/进入付款建议；4) 组织结构关系缺失优先视为配置/主数据问题。
      synonyms:
        - "SAP"
        - "采购管理"
        - "P2P"
        - "Procure-to-Pay"
        - "采购到付款"
        - "请购"
        - "采购订单"
        - "收货"
        - "供应商发票"
        - "三单匹配"
        - "GR/IR"
      examples:
        - "本月采购订单数量是多少？"
        - "有哪些暂存发票（parked invoice）还未释放？"
        - "为什么这个 PO 不可开票？"
        - "三单匹配异常主要集中在哪些物料/供应商？"
        - "GR/IR 未清金额是多少？"
        - "从请购到采购订单平均要多少天？"

    datasets:
      # ==========================================================
      # Dimensions / Master Data
      # ==========================================================
      - name: suppliers
        source: sap.p2p.suppliers
        primary_key: [supplier_id]
        unique_keys:
          - [supplier_id]
          - [supplier_number]
        description: 供应商（Business Partner / Supplier）
        ai_context:
          synonyms: ["供应商", "BP", "Business Partner", "Supplier"]
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SAP_P2P",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "suppliers/block",
                    "title": "冻结/阻断供应商",
                    "kind": "command",
                    "operation": "block",
                    "aggregate": "Supplier",
                    "entity_name": "suppliers",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["supplier_id"],
                        "properties": {
                          "supplier_id": { "type": "string" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["冻结这个供应商", "把供应商设为 Blocked"],
                    "tags": ["p2p", "supplier", "compliance"]
                  },
                  {
                    "id": "suppliers/unblock",
                    "title": "解冻/解除阻断供应商",
                    "kind": "command",
                    "operation": "unblock",
                    "aggregate": "Supplier",
                    "entity_name": "suppliers",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["supplier_id"],
                        "properties": {
                          "supplier_id": { "type": "string" },
                          "comment": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["解冻这个供应商", "解除供应商阻断"],
                    "tags": ["p2p", "supplier", "compliance"]
                  }
                ],
                "rules": [
                  {
                    "id": "sap_p2p/rule_blocked_vendor_transaction_prevention",
                    "title": "阻断供应商交易拦截策略",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "compliance" },
                    "message": "当供应商状态为 Blocked 时，不应继续创建/审批 PO、过账发票或执行付款；应先明确解冻审批流程。",
                    "remediation": "检查 suppliers.status 与阻断原因；若需交易，先走合规解冻流程（suppliers/unblock），再继续后续 P2P 动作。",
                    "tags": ["p2p", "supplier", "blocked", "control"]
                  }
                ]
              }
        fields:
          - name: supplier_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: suppliers.supplier_id
            description: 供应商内部ID
          - name: supplier_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: suppliers.supplier_number
            description: 供应商编码
          - name: supplier_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: suppliers.supplier_name
            description: 供应商名称
          - name: country
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: suppliers.country
            description: 国家/地区
          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: suppliers.status
            description: 状态（Active/Blocked 等）
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: suppliers.created_date
            description: 创建日期
            dimension:
              is_time: true

