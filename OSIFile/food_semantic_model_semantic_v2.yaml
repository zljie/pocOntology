    metrics:
      - name: total_order_items
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(order_items.order_item_id)
        description: 点餐明细总行数（可用于总点单量趋势）
        ai_context:
          synonyms: ["点单量", "明细数"]

      - name: total_orders
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(orders.order_id)
        description: 订单总数（包含所有状态；常用口径建议用 paid_orders）
        ai_context:
          synonyms: ["订单量", "下单量"]

      - name: paid_orders
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.paid_time IS NOT NULL AND orders.order_status = 'PAID' THEN 1 ELSE 0 END)
        description: 已支付订单数（默认口径）
        ai_context:
          synonyms: ["支付订单数", "成交订单数"]

      - name: gross_revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN orders.total_amount ELSE 0 END)
        description: 营收（默认：已支付订单 total_amount 之和）
        ai_context:
          synonyms: ["营业额", "销售额", "收入"]

      - name: dish_units_sold
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN order_items.quantity ELSE 0 END)
        description: 菜品销量（默认口径：已支付订单明细 quantity 之和；需经 orders join）
        ai_context:
          synonyms: ["销量", "售出份数", "卖了多少"]

      - name: discount_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(order_discounts.discount_amount)
        description: 优惠金额总计（订单优惠明细之和）
        ai_context:
          synonyms: ["优惠额", "折扣金额"]

      - name: refund_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'REFUNDED' THEN orders.total_amount ELSE 0 END)
        description: 退款金额（口径示例：退款订单 total_amount 之和，实际可拆退款流水表）
        ai_context:
          synonyms: ["退款", "退单金额"]

      - name: avg_prep_time_minutes
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(CASE WHEN order_items.served_time IS NOT NULL THEN (order_items.served_time - orders.order_time) END)
        description: 平均出餐时长（示例表达式；单位取决于数据库时间差语义）
        ai_context:
          synonyms: ["出餐时效", "上菜速度", "制作时长"]

      - name: dish_theoretical_unit_cost
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(dish_recipe_items.quantity * ingredient_costs.unit_cost * COALESCE(dish_recipe_items.yield_rate, 1))
        description: 菜品单份理论成本（按 dish_id 分组；口径：Σ配方用量×原材料单位成本×损耗系数）
        ai_context:
          synonyms: ["菜品成本", "单份成本", "理论成本"]

      - name: theoretical_food_cost_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN order_items.quantity * dish_recipe_items.quantity * ingredient_costs.unit_cost * COALESCE(dish_recipe_items.yield_rate, 1) ELSE 0 END)
        description: 理论原材料成本金额（口径：已支付订单的销量×配方用量×原材料单位成本）
        ai_context:
          synonyms: ["食材成本", "原材料成本", "food cost"]

      - name: gross_profit_estimate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN order_items.item_amount ELSE 0 END) - SUM(CASE WHEN orders.order_status = 'PAID' THEN order_items.quantity * dish_recipe_items.quantity * ingredient_costs.unit_cost * COALESCE(dish_recipe_items.yield_rate, 1) ELSE 0 END)
        description: 估算毛利（口径：已支付订单明细行金额 - 理论原材料成本金额；不含人工/房租/能耗等）
        ai_context:
          synonyms: ["毛利", "gross profit"]

      - name: inventory_on_hand_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(inventory_balances.on_hand_qty)
        description: 库存现存量（不含批次；口径：库存余额快照 Σon_hand_qty）
        ai_context:
          synonyms: ["库存", "现存量"]

      - name: expiring_lot_on_hand_qty
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(inventory_lot_balances.on_hand_qty)
        description: 临期批次现存量（口径：批次余额 Σon_hand_qty；临期阈值需在查询/分析时指定）
        ai_context:
          synonyms: ["临期库存", "到期风险"]

      - name: member_points_earned
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN loyalty_point_ledger.points_change > 0 THEN loyalty_point_ledger.points_change ELSE 0 END)
        description: 会员获得积分（按 customer_id 分组；口径：Σ正向 points_change；时间范围由查询指定）
        ai_context:
          synonyms: ["积分", "累计积分"]

      - name: member_points_net
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(loyalty_point_ledger.points_change)
        description: 会员积分净变动（按 customer_id 分组；口径：Σpoints_change；时间范围由查询指定）
        ai_context:
          synonyms: ["积分净值", "积分变动"]

      - name: member_paid_spend
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN orders.total_amount ELSE 0 END)
        description: 会员消费金额（按 customer_id 分组；口径：已支付订单 total_amount 汇总）
        ai_context:
          synonyms: ["会员消费", "会员实付"]

      - name: member_visit_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT CASE WHEN orders.order_status = 'PAID' THEN orders.order_id END)
        description: 会员到店/成交次数（按 customer_id 分组；口径：已支付订单数）
        ai_context:
          synonyms: ["会员到店次数", "消费次数"]

      - name: member_avg_ticket
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN orders.total_amount ELSE 0 END) / NULLIF(COUNT(DISTINCT CASE WHEN orders.order_status = 'PAID' THEN orders.order_id END), 0)
        description: 会员客单价（按 customer_id 分组；口径：已支付金额/已支付订单数）
        ai_context:
          synonyms: ["会员客单价", "平均消费"]

      - name: promotion_targeted_member_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT promotion_targets.customer_id)
        description: 活动触达会员数（口径：promotion_targets 去重 customer_id）
        ai_context:
          synonyms: ["触达人数", "目标会员数"]

      - name: coupon_redemption_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT coupon_redemptions.coupon_redemption_id)
        description: 优惠核销次数（口径：coupon_redemptions 记录数）
        ai_context:
          synonyms: ["核销次数", "用券次数"]

      - name: coupon_redemption_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(coupon_redemptions.discount_amount)
        description: 核销抵扣金额（口径：coupon_redemptions.discount_amount 汇总）
        ai_context:
          synonyms: ["核销金额", "用券金额"]
