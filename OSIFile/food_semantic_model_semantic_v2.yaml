# yaml-language-server: $schema=../core-spec/osi-schema.json

version: "0.1.1"

semantic_model:
  - name: restaurant_management_model_semantic_v2
    description: 餐饮管理系统语义模型（点餐服务/菜品管理/原材料与库存/成本核算/会员运营/活动营销/经营分析）
    ai_context:
      instructions: "用于餐饮经营分析与问答。围绕订单明细（order_items）做聚合，按门店、菜品、品类、时间、渠道、活动等维度切分。若用户只说“销量/营收”，默认指已支付订单；如需退款/取消需明确说明。涉及成本/库存/券/套餐口径，优先引用本模型的字段与规则说明，再给出结论。"
      synonyms:
        - "餐饮系统"
        - "点餐系统"
        - "门店经营"
        - "菜品运营"
      examples:
        - "本月各门店营业额是多少？"
        - "按菜品统计销量 Top 10"
        - "活动 A 带来的增量销量是多少？"
        - "按小时看高峰下单量"
        - "退款金额占比是多少？"

    datasets:
      - name: orders
        source: restaurant.public.orders
        primary_key: [order_id]
        unique_keys:
          - [order_id]
          - [order_number]
        description: 订单主表（点餐服务：每笔订单一行）
        ai_context:
          synonyms:
            - "订单"
            - "下单记录"
        fields:
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_id
            description: 订单ID
          - name: order_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_number
            description: 订单号（业务主键）
          - name: store_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.store_id
            description: 外键：门店
            ai_context:
              synonyms: ["门店ID"]
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.customer_id
            description: 外键：顾客
            ai_context:
              synonyms: ["顾客ID", "会员ID"]
          - name: channel
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.channel
            description: 下单渠道（如 dine_in/takeaway/delivery/app）
            ai_context:
              synonyms: ["渠道", "堂食外卖"]
          - name: order_status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_status
            description: 订单状态（CREATED/PAID/CANCELLED/REFUNDED等）
            ai_context:
              synonyms: ["状态", "是否支付"]
          - name: order_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_time
            description: 下单时间
            dimension:
              is_time: true
          - name: paid_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.paid_time
            description: 支付时间（未支付为空）
            dimension:
              is_time: true
          - name: total_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.total_amount
            description: 订单总金额（含折扣后/税费口径需在说明中统一）
            ai_context:
              synonyms: ["订单金额", "实付金额"]

      - name: order_items
        source: restaurant.public.order_items
        primary_key: [order_item_id]
        unique_keys:
          - [order_item_id]
        description: 订单明细（点餐服务：每个菜品一行，作为事实粒度推荐入口）
        ai_context:
          synonyms:
            - "点单明细"
            - "订单行"
            - "菜品销量明细"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "RESTAURANT",
                "behavior_layer_version": "0.2",
                "action_types": [
                  {
                    "id": "orders/create",
                    "title": "创建订单（下单）",
                    "kind": "command",
                    "operation": "create",
                    "aggregate": "Order",
                    "entity_name": "orders",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["store_id", "channel", "order_time"],
                        "properties": {
                          "store_id": { "type": "string" },
                          "customer_id": { "type": "string" },
                          "channel": { "type": "string" },
                          "order_time": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["创建一笔堂食订单", "用户下单生成订单"],
                    "tags": ["ddd", "订单", "下单"]
                  },
                  {
                    "id": "order_items/create",
                    "title": "新增订单明细（加菜）",
                    "kind": "command",
                    "operation": "create",
                    "aggregate": "Order",
                    "entity_name": "order_items",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_id", "dish_id", "quantity"],
                        "properties": {
                          "order_id": { "type": "string" },
                          "dish_id": { "type": "string" },
                          "quantity": { "type": "number" },
                          "item_price": { "type": "number" }
                        }
                      }
                    },
                    "examples": ["给订单加一份宫保鸡丁", "新增一条点单明细"],
                    "tags": ["crud", "点单", "写入"]
                  },
                  {
                    "id": "order_items/update",
                    "title": "修改订单明细（改数量/改价）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Order",
                    "entity_name": "order_items",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_item_id"],
                        "properties": {
                          "order_item_id": { "type": "string" },
                          "quantity": { "type": "number" },
                          "item_price": { "type": "number" }
                        }
                      }
                    },
                    "examples": ["把某条点单数量改为 2", "修改明细单价"],
                    "tags": ["crud", "更新"]
                  },
                  {
                    "id": "order_items/delete",
                    "title": "删除订单明细（退菜）",
                    "kind": "command",
                    "operation": "delete",
                    "aggregate": "Order",
                    "entity_name": "order_items",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_item_id"],
                        "properties": {
                          "order_item_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["退掉某条菜品明细", "删除点单明细"],
                    "tags": ["crud", "退菜", "删除"]
                  },
                  {
                    "id": "orders/pay",
                    "title": "支付订单",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Order",
                    "entity_name": "orders",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_id", "paid_time"],
                        "properties": {
                          "order_id": { "type": "string" },
                          "paid_time": { "type": "string" },
                          "payment_method": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["将订单标记为已支付", "支付完成更新支付时间"],
                    "tags": ["ddd", "支付", "业务动作"]
                  },
                  {
                    "id": "orders/refund",
                    "title": "退款订单",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Order",
                    "entity_name": "orders",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_id"],
                        "properties": {
                          "order_id": { "type": "string" },
                          "refund_amount": { "type": "number" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["对订单发起退款", "取消订单并退款"],
                    "tags": ["ddd", "退款", "业务动作"]
                  },
                  {
                    "id": "order_items/top_dishes",
                    "title": "生成菜品销量 TopN",
                    "description": "按时间/门店/品类筛选后输出销量 TopN 菜品，用于运营复盘。",
                    "applies_to": { "entity": "metric", "selectors": { "metric_names": ["dish_units_sold"] } },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "start_date": { "type": "string", "description": "开始日期（YYYY-MM-DD）" },
                          "end_date": { "type": "string", "description": "结束日期（YYYY-MM-DD）" },
                          "store_id": { "type": "string", "description": "门店ID（可选）" },
                          "category_id": { "type": "string", "description": "品类ID（可选）" },
                          "top_n": { "type": "number", "description": "Top N（默认 10）" }
                        }
                      }
                    },
                    "examples": ["按菜品统计销量 Top 10", "本周各门店销量Top5菜品"],
                    "tags": ["销量", "排行", "菜品运营"]
                  }
                ],
                "rules": [
                  {
                    "id": "food/rule_paid_only_default",
                    "title": "营收/销量默认口径：仅已支付",
                    "severity": "warn",
                    "when": { "entity": "metric", "selectors": { "metric_names": ["gross_revenue", "dish_units_sold"] } },
                    "constraint": { "type": "filter" },
                    "message": "营收与销量默认仅统计已支付订单（orders.order_status='PAID'）。",
                    "remediation": "如需包含退款/取消，请新增独立指标或在问题中明确说明口径。",
                    "tags": ["口径", "支付状态"]
                  },
                  {
                    "id": "food/rule_costing_assumptions",
                    "title": "成本/毛利口径声明（配方×单位成本）",
                    "severity": "warn",
                    "when": { "entity": "metric", "selectors": { "metric_names": ["dish_theoretical_unit_cost", "theoretical_food_cost_amount", "gross_profit_estimate"] } },
                    "constraint": { "type": "definition" },
                    "message": "成本/毛利相关指标依赖配方与原材料单位成本：默认按当前成本或成本快照计算，且不包含人工/房租/能耗等间接成本。",
                    "remediation": "如需按下单日成本、含税/不含税、含损耗等口径，请在映射层补齐成本取数规则（按 as_of_date 有效期/加权均价）并明确说明。",
                    "tags": ["口径", "成本", "毛利"]
                  },
                  {
                    "id": "food/rule_inventory_expiry_assumptions",
                    "title": "临期口径声明（批次/效期）",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "definition" },
                    "message": "临期分析依赖库存批次的 expiry_date 与批次余额 on_hand_qty。若无批次/效期数据，不能给出“临期最严重”的结论。",
                    "remediation": "建议以 inventory_lots/ inventory_lot_balances 落表；并统一“临期阈值（如≤7天/≤3天）”的业务口径。",
                    "tags": ["口径", "库存", "临期"]
                  }
                ]
              }
        fields:
          - name: order_item_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.order_item_id
            description: 明细行ID
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.order_id
            description: 外键：订单
          - name: dish_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.dish_id
            description: 外键：菜品
            ai_context:
              synonyms: ["菜品ID"]
          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.quantity
            description: 数量
            ai_context:
              synonyms: ["份数", "销量"]
          - name: item_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.item_price
            description: 单价（下单时价格快照）
            ai_context:
              synonyms: ["单价"]
          - name: item_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.item_amount
            description: 行金额（quantity * item_price - item_discount）
            ai_context:
              synonyms: ["行金额", "明细金额"]
          - name: item_discount_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.item_discount_amount
            description: 明细折扣金额
            ai_context:
              synonyms: ["折扣金额"]
          - name: served_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.served_time
            description: 出餐/上菜时间（可用于出餐时效分析）
            dimension:
              is_time: true

      - name: dishes
        source: restaurant.public.dishes
        primary_key: [dish_id]
        unique_keys:
          - [dish_id]
          - [dish_code]
        description: 菜品主数据（菜品管理服务）
        ai_context:
          synonyms:
            - "菜品"
            - "菜单"
        fields:
          - name: dish_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.dish_id
            description: 菜品ID
          - name: dish_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.dish_code
            description: 菜品编码（业务主键）
          - name: dish_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.dish_name
            description: 菜品名称
            ai_context:
              synonyms: ["名称", "菜名"]
          - name: category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.category_id
            description: 外键：品类
          - name: is_active
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.is_active
            description: 是否上架
            ai_context:
              synonyms: ["上架", "可售"]
          - name: base_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.base_price
            description: 标准定价（非下单快照）
          - name: created_at
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.created_at
            description: 创建时间
            dimension:
              is_time: true

      - name: dish_categories
        source: restaurant.public.dish_categories
        primary_key: [category_id]
        unique_keys:
          - [category_id]
          - [category_code]
        description: 菜品品类（菜品管理服务）
        ai_context:
          synonyms:
            - "品类"
            - "菜品分类"
        fields:
          - name: category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dish_categories.category_id
            description: 品类ID
          - name: category_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dish_categories.category_name
            description: 品类名称
            ai_context:
              synonyms: ["分类名称", "类目"]
          - name: parent_category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dish_categories.parent_category_id
            description: 上级品类ID（可用于层级品类）

      - name: stores
        source: restaurant.public.stores
        primary_key: [store_id]
        unique_keys:
          - [store_id]
          - [store_code]
        description: 门店维度（经营分析/组织维度）
        ai_context:
          synonyms:
            - "门店"
            - "分店"
            - "店铺"
        fields:
          - name: store_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.store_id
            description: 门店ID
          - name: store_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.store_code
            description: 门店编码
          - name: store_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.store_name
            description: 门店名称
            ai_context:
              synonyms: ["店名"]
          - name: city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.city
            description: 城市
          - name: region
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.region
            description: 区域/大区

      - name: customers
        source: restaurant.public.customers
        primary_key: [customer_id]
        unique_keys:
          - [customer_id]
          - [customer_number]
        description: 顾客/会员维度（会员分析）
        ai_context:
          synonyms:
            - "顾客"
            - "会员"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "RESTAURANT",
                "behavior_layer_version": "0.2",
                "action_types": [
                  {
                    "id": "customers/top_members_by_points",
                    "title": "查询积分最多的会员 TopN",
                    "kind": "query",
                    "operation": "rank",
                    "aggregate": "CustomerAnalytics",
                    "entity_name": "customers",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["date_range"],
                        "properties": {
                          "date_range": {
                            "type": "object",
                            "additionalProperties": false,
                            "required": ["start", "end"],
                            "properties": {
                              "start": { "type": "string", "format": "date-time" },
                              "end": { "type": "string", "format": "date-time" }
                            }
                          },
                          "top_n": { "type": "integer", "default": 10 },
                          "include_negative": { "type": "boolean", "default": false }
                        }
                      }
                    },
                    "examples": ["查询去年积分最多的前10个用户", "今年积分Top20会员是谁？"],
                    "tags": ["会员", "积分", "排行"]
                  }
                ],
                "rules": []
              }
        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.customer_id
            description: 顾客ID
          - name: customer_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.customer_number
            description: 会员编号（业务主键）
          - name: full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.first_name || ' ' || customers.last_name
            description: 姓名（计算字段）
            ai_context:
              synonyms: ["姓名", "顾客姓名", "会员姓名"]
          - name: phone
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.phone
            description: 手机号
            ai_context:
              synonyms: ["手机号", "电话"]
          - name: join_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.join_date
            description: 注册时间
            dimension:
              is_time: true

      - name: ingredient_categories
        source: restaurant.public.ingredient_categories
        primary_key: [category_id]
        unique_keys:
          - [category_id]
        description: 原材料分类（如粮油米醋盐/肉类/海鲜/蔬菜等）
        ai_context:
          synonyms: ["原材料分类", "食材分类"]
        fields:
          - name: category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredient_categories.category_id
            description: 分类ID
          - name: category_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredient_categories.category_name
            description: 分类名称
          - name: parent_category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredient_categories.parent_category_id
            description: 上级分类ID

      - name: ingredients
        source: restaurant.public.ingredients
        primary_key: [ingredient_id]
        unique_keys:
          - [ingredient_id]
          - [ingredient_code]
        description: 原材料主数据（仓库食材清单）
        ai_context:
          synonyms: ["原材料", "食材", "库存物料"]
        fields:
          - name: ingredient_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.ingredient_id
            description: 原材料ID
          - name: ingredient_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.ingredient_code
            description: 原材料编码（业务主键）
          - name: ingredient_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.ingredient_name
            description: 原材料名称
          - name: category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.category_id
            description: 外键：原材料分类
          - name: base_uom
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.base_uom
            description: 基本计量单位
          - name: is_active
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.is_active
            description: 是否启用
          - name: created_at
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ingredients.created_at
            description: 创建时间
            dimension:
